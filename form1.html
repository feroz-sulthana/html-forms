<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Form</title>


<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient( 90deg,#1da1f2, #5b2bd6,#e83e8c);
}

.input-box{
    position: relative;
    width: 350px;
    margin: 20px;
}

.input-box input{
    width: 100%;
    padding: 10px 10px 10px 35px;
    border-radius: 15px;
    font-size: large;
}

.input-box i{
    position: absolute;
    left: 10px;
    top: 12px;
    color: gray;
}

button{
    border-radius: 10px;
    margin-left: 30%;
    border-color: #e83e8c;
    
    background: linear-gradient( 90deg,#1da1f2, #5b2bd6,#e83e8c);
    
    font-size: 30px;
    color:white;
}

.input{
    color: white;
}

.input a{
    color: rgb(255, 0, 174);
}

.container{
    text-align: center;
}
img{
    margin-left: 3%;
    border-radius: 15px;
}

</style>
</head>

<body>

<div class="container">
    <h1>Create an Account</h1>

<div class="input-box">
<i class="fa-solid fa-user"></i>
<input type="text" placeholder="Username">
</div>

<div class="input-box">
<i class="fa-solid fa-phone"></i>
<input type="text" placeholder="Phone Number">
</div>

<div class="input-box">
<i class="fa-solid fa-envelope"></i>
<input type="text" placeholder="Email">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" placeholder="Password">
</div>

<div class="input">
<input type="checkbox"> I agree to the 
<a href="#">Terms and Conditions</a> and 
<a href="#">Privacy Policy</a>
<br><br>
</div>

<button>Create Account</button>

</div>
<img src="https://pbs.twimg.com/media/GjsHOY6WwAAAErg.jpg" height="350px" width="400px">

</body>
</html>
